esphome:
  name: stocks-panel
  on_boot:
    priority: -100
    then:
      - wait_until:
          wifi.connected:
      - script.execute: fetch_all_stocks

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
api:
  encryption:
    key: !secret api_encryption_key

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# --- HTTP Request (for fetching stock JSON) ---
http_request:
  useragent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  timeout: 10s
  verify_ssl: false

# --- Web Server (HTTP Config Page) ---
web_server:
  port: 80

# --- Time component (for header updates) ---
time:
  - platform: sntp
    id: sntp_time
    timezone: "CET-1CEST,M3.5.0,M10.5.0/3"

# --- JC3248W535C_I hardware (QSPI + AXS15231) ---
spi:
  - type: quad
    clk_pin: 47
    data_pins: [21, 48, 40, 39]

i2c:
  - id: i2c_bus
    sda: 4
    scl: 8

output:
  - platform: ledc
    id: gpio_backlight_pwm
    pin: 1

light:
  - platform: monochromatic
    id: backlight
    name: Backlight
    output: gpio_backlight_pwm
    restore_mode: ALWAYS_ON

display:
  - platform: qspi_dbi
    id: lcd
    dimensions:
      width: 320
      height: 480
    rotation: 90
    model: CUSTOM
    data_rate: 40MHz
    cs_pin:
      number: 45
      ignore_strapping_warning: true
    draw_from_origin: true
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: axs15231
    id: touch
    i2c_id: i2c_bus
    address: 0x3B
    transform:
      swap_xy: true
      mirror_x: true
    update_interval: 50ms
    touch_timeout: 50ms

# --- Fonts ---
font:
  - file: "gfonts://Roboto"
    id: f_title
    size: 28
  - file: "gfonts://Roboto Mono"
    id: f_card_title
    size: 22
  - file: "gfonts://Roboto Mono"
    id: f_price
    size: 24
  - file: "gfonts://Roboto"
    id: f_change
    size: 16
  - file: "gfonts://Roboto"
    id: f_small
    size: 14

# --- User settings: Stock Symbols (persisted in flash) ---
text:
  - platform: template
    id: stock_symbol_1
    name: "Stock 1 Symbol"
    mode: text
    min_length: 0
    max_length: 10
    initial_value: "AAPL"
    restore_value: true
    set_action:
      then:
        - lambda: |-
            std::string sym = x;
            std::transform(sym.begin(), sym.end(), sym.begin(), ::toupper);
            sym.erase(sym.begin(), std::find_if(sym.begin(), sym.end(), [](unsigned char ch) { return !std::isspace(ch); }));
            sym.erase(std::find_if(sym.rbegin(), sym.rend(), [](unsigned char ch) { return !std::isspace(ch); }).base(), sym.end());
            id(stock_symbol_1).publish_state(sym);
    on_value:
      - script.execute: fetch_stock_1
