# --- Periodic UI Refresh Loop ---
interval:
  - interval: 2s
    then:
      - lambda: |-
          auto update_card = [](const std::string& symbol, float price, float change, float pct_change,
                                lv_obj_t* sym_lbl, lv_obj_t* price_lbl, lv_obj_t* chg_lbl, lv_obj_t* card_obj) {
            std::string sym = symbol;
            std::transform(sym.begin(), sym.end(), sym.begin(), ::toupper);
            
            if (sym.empty()) {
              lv_label_set_text(sym_lbl, "EMPTY");
              lv_label_set_text(price_lbl, "---");
              lv_label_set_text(chg_lbl, "Edit in Web UI");
              lv_obj_set_style_border_color(card_obj, lv_color_hex(0x2A3E5C), LV_PART_MAIN);
              return;
            }
            
            lv_label_set_text(sym_lbl, sym.c_str());
            
            if (std::isnan(price)) {
              lv_label_set_text(price_lbl, "---");
              lv_label_set_text(chg_lbl, "Loading/Error");
              lv_obj_set_style_border_color(card_obj, lv_color_hex(0x2A3E5C), LV_PART_MAIN);
              return;
            }
            
            char price_buf[32];
            snprintf(price_buf, sizeof(price_buf), "$%.2f", price);
            lv_label_set_text(price_lbl, price_buf);
            
            char chg_buf[64];
            const char* sign = (change >= 0.0f) ? "+" : "";
            snprintf(chg_buf, sizeof(chg_buf), "%s%.2f (%s%.2f%%)", sign, change, sign, pct_change);
            lv_label_set_text(chg_lbl, chg_buf);
            
            uint32_t color = (change >= 0.0f) ? 0x2ECC71 : 0xE74C3C;
            lv_obj_set_style_text_color(chg_lbl, lv_color_hex(color), LV_PART_MAIN);
            lv_obj_set_style_border_color(card_obj, lv_color_hex(color), LV_PART_MAIN);
          };
          
          update_card(id(stock_symbol_1).state, id(stock_1_price).state, id(stock_1_change).state, id(stock_1_pct_change).state,
                      id(sym_1), id(price_1), id(chg_1), id(card_1));
          update_card(id(stock_symbol_2).state, id(stock_2_price).state, id(stock_2_change).state, id(stock_2_pct_change).state,
                      id(sym_2), id(price_2), id(chg_2), id(card_2));
          update_card(id(stock_symbol_3).state, id(stock_3_price).state, id(stock_3_change).state, id(stock_3_pct_change).state,
                      id(sym_3), id(price_3), id(chg_3), id(card_3));
          update_card(id(stock_symbol_4).state, id(stock_4_price).state, id(stock_4_change).state, id(stock_4_pct_change).state,
                      id(sym_4), id(price_4), id(chg_4), id(card_4));

          if (id(sntp_time).now().is_valid()) {
            char time_buf[64];
            snprintf(time_buf, sizeof(time_buf), "Last Update: %02d:%02d", id(sntp_time).now().hour, id(sntp_time).now().minute);
            lv_label_set_text(id(update_status), time_buf);
          } else {
            lv_label_set_text(id(update_status), "Last Update: Active");
          }

  # Query stocks every 5 minutes
  - interval: 5min
    then:
      - script.execute: fetch_all_stocks

# --- Scripts to Query Stock Info ---
script:
  - id: fetch_all_stocks
    mode: restart
    then:
      - script.execute: fetch_stock_1
      - script.wait: fetch_stock_1
      - delay: 1s
      - script.execute: fetch_stock_2
      - script.wait: fetch_stock_2
      - delay: 1s
      - script.execute: fetch_stock_3
      - script.wait: fetch_stock_3
      - delay: 1s
      - script.execute: fetch_stock_4
      - script.wait: fetch_stock_4

  - id: fetch_stock_1
    mode: restart
    then:
      - lambda: |-
          std::string sym = id(stock_symbol_1).state;
          std::transform(sym.begin(), sym.end(), sym.begin(), ::toupper);
          sym.erase(sym.begin(), std::find_if(sym.begin(), sym.end(), [](unsigned char ch) { return !std::isspace(ch); }));
          sym.erase(std::find_if(sym.rbegin(), sym.rend(), [](unsigned char ch) { return !std::isspace(ch); }).base(), sym.end());
          if (sym.empty()) {
            id(stock_1_price).publish_state(NAN);
            id(stock_1_change).publish_state(NAN);
            id(stock_1_pct_change).publish_state(NAN);
            id(fetch_stock_1).stop();
          }
      - http_request.get:
          url: !lambda |-
            std::string sym = id(stock_symbol_1).state;
            std::transform(sym.begin(), sym.end(), sym.begin(), ::toupper);
            sym.erase(sym.begin(), std::find_if(sym.begin(), sym.end(), [](unsigned char ch) { return !std::isspace(ch); }));
            sym.erase(std::find_if(sym.rbegin(), sym.rend(), [](unsigned char ch) { return !std::isspace(ch); }).base(), sym.end());
            return "https://query1.finance.yahoo.com/v8/finance/chart/" + sym + "?interval=1d&range=1d";
          capture_response: true
          max_response_buffer_size: 16384
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    bool success = json::parse_json(body, [](JsonObject root) -> bool {
                      JsonObject chart = root["chart"];
                      if (chart.isNull()) return false;
                      JsonArray result = chart["result"];
                      if (result.isNull() || result.size() == 0) return false;
                      JsonObject meta = result[0]["meta"];
                      if (meta.isNull()) return false;
                      
                      if (meta["regularMarketPrice"].isNull() || meta["chartPreviousClose"].isNull()) {
                        return false;
                      }
                      
                      float price = meta["regularMarketPrice"].as<float>();
                      float prev_close = meta["chartPreviousClose"].as<float>();
                      float change = price - prev_close;
                      float pct_change = (change / prev_close) * 100.0f;
                      
                      id(stock_1_price).publish_state(price);
                      id(stock_1_change).publish_state(change);
                      id(stock_1_pct_change).publish_state(pct_change);
                      return true;
                    });
                    if (!success) {
                      ESP_LOGW("stock", "Failed to parse Stock 1 JSON");
                      id(stock_1_price).publish_state(NAN);
                    }
                  } else {
                    ESP_LOGW("stock", "Stock 1 request failed: %d", response->status_code);
                    id(stock_1_price).publish_state(NAN);
                    
                    std::string sym = id(stock_symbol_1).state;
                    if (response->status_code == 404 && sym.find('.') == std::string::npos) {
                      ESP_LOGI("stock", "Stock 1 failed with 404. Attempting to search for suffix...");
                      id(search_stock_1).execute();
                    }
                  }

  - id: search_stock_1
    mode: restart
    then:
      - http_request.get:
          url: !lambda |-
            std::string sym = id(stock_symbol_1).state;
            std::transform(sym.begin(), sym.end(), sym.begin(), ::toupper);
            sym.erase(sym.begin(), std::find_if(sym.begin(), sym.end(), [](unsigned char ch) { return !std::isspace(ch); }));
            sym.erase(std::find_if(sym.rbegin(), sym.rend(), [](unsigned char ch) { return !std::isspace(ch); }).base(), sym.end());
            return "https://query1.finance.yahoo.com/v1/finance/search?q=" + sym;
          capture_response: true
          max_response_buffer_size: 16384
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    json::parse_json(body, [](JsonObject root) -> bool {
                      JsonArray quotes = root["quotes"];
                      if (quotes.isNull() || quotes.size() == 0) return false;
                      JsonObject first_quote = quotes[0];
                      if (first_quote.isNull()) return false;
                      const char* resolved_sym = first_quote["symbol"];
                      if (resolved_sym != nullptr) {
                        std::string res_str = resolved_sym;
                        std::string current_sym = id(stock_symbol_1).state;
                        if (res_str != current_sym) {
                          ESP_LOGI("stock", "Resolved symbol %s to %s", current_sym.c_str(), res_str.c_str());
                          id(stock_symbol_1).publish_state(res_str);
                        }
                      }
                      return true;
                    });
                  } else {
                    ESP_LOGW("stock", "Ticker search 1 failed: %d", response->status_code);
                  }

  - id: fetch_stock_2
    mode: restart
    then:
      - lambda: |-
          std::string sym = id(stock_symbol_2).state;
          std::transform(sym.begin(), sym.end(), sym.begin(), ::toupper);
          sym.erase(sym.begin(), std::find_if(sym.begin(), sym.end(), [](unsigned char ch) { return !std::isspace(ch); }));
          sym.erase(std::find_if(sym.rbegin(), sym.rend(), [](unsigned char ch) { return !std::isspace(ch); }).base(), sym.end());
          if (sym.empty()) {
            id(stock_2_price).publish_state(NAN);
            id(stock_2_change).publish_state(NAN);
            id(stock_2_pct_change).publish_state(NAN);
            id(fetch_stock_2).stop();
          }
      - http_request.get:
          url: !lambda |-
            std::string sym = id(stock_symbol_2).state;
            std::transform(sym.begin(), sym.end(), sym.begin(), ::toupper);
            sym.erase(sym.begin(), std::find_if(sym.begin(), sym.end(), [](unsigned char ch) { return !std::isspace(ch); }));
            sym.erase(std::find_if(sym.rbegin(), sym.rend(), [](unsigned char ch) { return !std::isspace(ch); }).base(), sym.end());
            return "https://query1.finance.yahoo.com/v8/finance/chart/" + sym + "?interval=1d&range=1d";
          capture_response: true
          max_response_buffer_size: 16384
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    bool success = json::parse_json(body, [](JsonObject root) -> bool {
                      JsonObject chart = root["chart"];
                      if (chart.isNull()) return false;
                      JsonArray result = chart["result"];
                      if (result.isNull() || result.size() == 0) return false;
                      JsonObject meta = result[0]["meta"];
                      if (meta.isNull()) return false;
                      
                      if (meta["regularMarketPrice"].isNull() || meta["chartPreviousClose"].isNull()) {
                        return false;
                      }
                      
                      float price = meta["regularMarketPrice"].as<float>();
                      float prev_close = meta["chartPreviousClose"].as<float>();
                      float change = price - prev_close;
                      float pct_change = (change / prev_close) * 100.0f;
                      
                      id(stock_2_price).publish_state(price);
                      id(stock_2_change).publish_state(change);
                      id(stock_2_pct_change).publish_state(pct_change);
                      return true;
                    });
                    if (!success) {
                      ESP_LOGW("stock", "Failed to parse Stock 2 JSON");
                      id(stock_2_price).publish_state(NAN);
                    }
                  } else {
                    ESP_LOGW("stock", "Stock 2 request failed: %d", response->status_code);
                    id(stock_2_price).publish_state(NAN);
                    
                    std::string sym = id(stock_symbol_2).state;
                    if (response->status_code == 404 && sym.find('.') == std::string::npos) {
