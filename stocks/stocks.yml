            sym.erase(std::find_if(sym.rbegin(), sym.rend(), [](unsigned char ch) { return !std::isspace(ch); }).base(), sym.end());
            return "https://query1.finance.yahoo.com/v1/finance/search?q=" + sym;
          capture_response: true
          max_response_buffer_size: 16384
          on_response:
            then:
              - lambda: |-
                  if (response->status_code == 200) {
                    json::parse_json(body, [](JsonObject root) -> bool {
                      JsonArray quotes = root["quotes"];
                      if (quotes.isNull() || quotes.size() == 0) return false;
                      JsonObject first_quote = quotes[0];
                      if (first_quote.isNull()) return false;
                      const char* resolved_sym = first_quote["symbol"];
                      if (resolved_sym != nullptr) {
                        std::string res_str = resolved_sym;
                        std::string current_sym = id(stock_symbol_2).state;
                        if (res_str != current_sym) {
                          ESP_LOGI("stock", "Resolved symbol %s to %s", current_sym.c_str(), res_str.c_str());
                          id(stock_symbol_2).publish_state(res_str);
                        }
                      }
                      return true;
                    });
                  } else {
                    ESP_LOGW("stock", "Ticker search 2 failed: %d", response->status_code);
                  }

  - id: fetch_stock_3
    mode: restart
    then:
      - lambda: |-
