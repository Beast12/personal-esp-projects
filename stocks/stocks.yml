            sym.erase(sym.begin(), std::find_if(sym.begin(), sym.end(), [](unsigned char ch) { return !std::isspace(ch); }));
            sym.erase(std::find_if(sym.rbegin(), sym.rend(), [](unsigned char ch) { return !std::isspace(ch); }).base(), sym.end());
            id(stock_symbol_2).publish_state(sym);
    on_value:
      - script.execute: fetch_stock_2
  - platform: template
    id: stock_symbol_3
    name: "Stock 3 Symbol"
