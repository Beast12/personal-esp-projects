# --- Physics Animation Update Loop ---
# Runs at 20 frames per second (50ms interval) for smooth movements
interval:
  - interval: 50ms
    then:
      - lambda: |-
          // Execute C++ physics and logic update
          global_aquarium.update(id(fish_fed_count));
          
          // Refresh feeds count on screen
          char buf[32];
          snprintf(buf, sizeof(buf), "Feeds: %d", global_aquarium.fed_count);
          lv_label_set_text(id(fed_status), buf);
