esphome:
  name: aquarium-panel
  includes:
    - aquarium.h
  on_boot:
    priority: -100
    then:
      - lambda: |-
          static std::vector<lv_obj_t*> fish_objs = {
            id(fish_0), id(fish_1), id(fish_2), id(fish_3),
            id(fish_4), id(fish_5), id(fish_6), id(fish_7),
            id(fish_8), id(fish_9), id(fish_10), id(fish_11)
          };
          static std::vector<lv_obj_t*> bubble_objs = {id(bubble_0), id(bubble_1), id(bubble_2), id(bubble_3), id(bubble_4), id(bubble_5), id(bubble_6), id(bubble_7)};
          static std::vector<lv_obj_t*> food_objs = {id(food_0), id(food_1), id(food_2), id(food_3), id(food_4)};
          static std::vector<lv_obj_t*> seaweed_objs = {id(seaweed_0), id(seaweed_1), id(seaweed_2), id(seaweed_3), id(seaweed_4)};
          global_aquarium.setup(
            id(aquarium_bg),
            fish_objs,
            bubble_objs,
            food_objs,
            seaweed_objs,
            id(crab_bottom),
            id(shark_predator),
            id(tap_indicator),
            id(castle_ornament),
            id(f_card_title),
            id(f_small),
            id(f_tiny)
          );

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
ota:
  - platform: esphome

api:
  encryption:
    key: !secret api_encryption_key
  # Expose actions to Home Assistant
  services:
    - service: feed_fish
      then:
        - lambda: |-
            global_aquarium.feed();
    - service: tap_glass
      then:
        - lambda: |-
            global_aquarium.tap(240, 160);
    - service: spawn_shark
      then:
        - lambda: |-
            global_aquarium.spawn_shark();

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Use IP address directly for cross-subnet resolution
  use_address: 192.168.1.190

# --- Web Server (for basic diagnostics) ---
web_server:
  port: 80

# --- JC3248W535C_I Hardware Interfaces ---
spi:
  - type: quad
    clk_pin: 47
    data_pins: [21, 48, 40, 39]

i2c:
  - id: i2c_bus
    sda: 4
    scl: 8

output:
  - platform: ledc
    id: gpio_backlight_pwm
    pin: 1

light:
  - platform: monochromatic
    id: backlight
    name: Backlight
    output: gpio_backlight_pwm
    restore_mode: ALWAYS_ON

display:
  - platform: qspi_dbi
    id: lcd
    dimensions:
      width: 320
      height: 480
    rotation: 90
    model: CUSTOM
    data_rate: 40MHz
    cs_pin:
      number: 45
      ignore_strapping_warning: true
    draw_from_origin: true
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: axs15231
    id: touch
    i2c_id: i2c_bus
    address: 0x3B
    transform:
      swap_xy: true
      mirror_x: true
    update_interval: 50ms
    touch_timeout: 50ms
    # Tapping screen physically triggers ripple/panic
    on_touch:
      then:
        - lambda: |-
            global_aquarium.tap(touch.x, touch.y);

# --- Fonts ---
font:
  - file: "gfonts://Roboto"
    id: f_title
    size: 28
  - file: "gfonts://Roboto Mono"
    id: f_card_title
    size: 22
  - file: "gfonts://Roboto"
    id: f_small
    size: 14
  - file: "gfonts://Roboto"
    id: f_tiny
    size: 10
# --- Home Assistant Sensors and Switches ---
sensor:
  - platform: template
    name: "Fish Fed Count"
    id: fish_fed_count
    accuracy_decimals: 0
    unit_of_measurement: "times"
    state_class: total_increasing

switch:
  - platform: template
    name: "Aquarium Bubbler"
    id: bubbler_switch
    optimistic: true
    restore_mode: ALWAYS_ON
    turn_on_action:
      - lambda: |-
          global_aquarium.set_bubbler(true);
    turn_off_action:
      - lambda: |-
          global_aquarium.set_bubbler(false);

  - platform: template
    name: "Aquarium Disco Mode"
    id: disco_switch
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          global_aquarium.set_disco(true);
    turn_off_action:
      - lambda: |-
          global_aquarium.set_disco(false);

# --- LVGL User Interface layout ---
lvgl:
  theme:
    obj:
      bg_color: 0x050F26
      text_color: 0xE6EDF7
  pages:
    - id: main_page
      widgets:
        # 1. Background
        - obj:
            id: aquarium_bg
            x: 0
            y: 0
            width: 100%
            height: 100%
            radius: 0
            border_width: 0

        # 2. Seaweed stalks (vertical bg rectangles at bottom of screen)
        - obj:
            id: seaweed_0
            x: 35
            y: 240
            width: 14
            height: 80
            radius: 6
            border_width: 0
        - obj:
            id: seaweed_1
            x: 85
            y: 220
            width: 18
            height: 100
            radius: 6
            border_width: 0
        - obj:
            id: seaweed_2
            x: 190
            y: 250
            width: 12
            height: 70
            radius: 6
            border_width: 0
        - obj:
            id: seaweed_3
            x: 290
            y: 230
            width: 16
            height: 90
            radius: 6
            border_width: 0
        - obj:
            id: seaweed_4
            x: 435
            y: 260
            width: 14
            height: 60
            radius: 6
            border_width: 0


        # 4. Fed status counter
        - label:
            id: fed_status
            text: "Feeds: 0"
            x: 380
