        # 1. Background
        - obj:
            id: aquarium_bg
            x: 0
            y: 0
            width: 100%
            height: 100%
            radius: 0
            border_width: 0

        # 2. Seaweed stalks (3-segment organic bending stalks)
        # Stalk 0
