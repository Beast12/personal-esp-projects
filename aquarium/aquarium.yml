        - label: { id: fish_1, text: "><>", x: 0, y: 0, text_font: f_card_title }
        - label: { id: fish_2, text: "><>", x: 0, y: 0, text_font: f_card_title }
        - label: { id: fish_3, text: "><>", x: 0, y: 0, text_font: f_card_title }
        - label: { id: fish_4, text: "><>", x: 0, y: 0, text_font: f_card_title }
        - label: { id: fish_5, text: "><>", x: 0, y: 0, text_font: f_card_title }
        - label: { id: fish_6, text: "><>", x: 0, y: 0, text_font: f_card_title }
        - label: { id: fish_7, text: "><>", x: 0, y: 0, text_font: f_card_title }
