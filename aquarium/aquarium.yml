        - label: { id: bubble_5, text: "O", x: 0, y: 0, text_font: f_small }
        - label: { id: bubble_6, text: "o", x: 0, y: 0, text_font: f_small }
        - label: { id: bubble_7, text: ".", x: 0, y: 0, text_font: f_small }

        # 7. Pre-allocated Food Labels
        - label: { id: food_0, text: "•", x: 0, y: 0, text_font: f_small }
        - label: { id: food_1, text: "•", x: 0, y: 0, text_font: f_small }
        - label: { id: food_2, text: "•", x: 0, y: 0, text_font: f_small }
        - label: { id: food_3, text: "•", x: 0, y: 0, text_font: f_small }
        - label: { id: food_4, text: "•", x: 0, y: 0, text_font: f_small }

        # 8. Crab crawler
