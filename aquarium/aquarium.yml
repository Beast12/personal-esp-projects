esphome:
  name: aquarium-panel
  includes:
    - aquarium.h
  on_boot:
    priority: -100
    then:
      - lambda: |-
          static std::vector<lv_obj_t*> fish_objs = {
            id(fish_0), id(fish_1), id(fish_2), id(fish_3),
            id(fish_4), id(fish_5), id(fish_6), id(fish_7),
            id(fish_8), id(fish_9), id(fish_10), id(fish_11)
          };
          static std::vector<lv_obj_t*> bubble_objs = {id(bubble_0), id(bubble_1), id(bubble_2), id(bubble_3), id(bubble_4), id(bubble_5), id(bubble_6), id(bubble_7)};
          static std::vector<lv_obj_t*> food_objs = {id(food_0), id(food_1), id(food_2), id(food_3), id(food_4)};
          
          static std::vector<lv_obj_t*> seaweed_objs_base = {id(seaweed_0_base), id(seaweed_1_base), id(seaweed_2_base), id(seaweed_3_base), id(seaweed_4_base)};
          static std::vector<lv_obj_t*> seaweed_objs_mid = {id(seaweed_0_mid), id(seaweed_1_mid), id(seaweed_2_mid), id(seaweed_3_mid), id(seaweed_4_mid)};
          static std::vector<lv_obj_t*> seaweed_objs_top = {id(seaweed_0_top), id(seaweed_1_top), id(seaweed_2_top), id(seaweed_3_top), id(seaweed_4_top)};
          
          static std::vector<lv_obj_t*> castle_parts = {
            id(castle_keep), id(castle_tower_l), id(castle_tower_r),
            id(castle_roof_l), id(castle_roof_r), id(castle_gate)
          };
          
          static std::vector<lv_obj_t*> chest_parts = {
            id(chest_body), id(chest_lid), id(chest_lock)
          };
          
          static std::vector<lv_obj_t*> alert_parts = {
            id(alert_banner), id(alert_label), id(alert_light_l), id(alert_light_r)
          };
          
          global_aquarium.setup(
            id(aquarium_bg),
            fish_objs,
            bubble_objs,
            food_objs,
            seaweed_objs_base,
            seaweed_objs_mid,
            seaweed_objs_top,
            id(crab_bottom),
            id(shark_predator),
            id(tap_indicator),
            castle_parts,
            chest_parts,
            alert_parts,
            id(f_card_title),
            id(f_small),
            id(f_tiny)
          );

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf

psram:
  mode: octal
  speed: 80MHz

logger:
ota:
  - platform: esphome

api:
  encryption:
    key: !secret api_encryption_key
  # Expose actions to Home Assistant
  services:
    - service: feed_fish
      then:
        - lambda: |-
            global_aquarium.feed();
    - service: tap_glass
      then:
        - lambda: |-
            global_aquarium.tap(240, 160);
    - service: spawn_shark
      then:
        - lambda: |-
            global_aquarium.spawn_shark();
    - service: show_alert
      variables:
        message: string
        duration_seconds: int
      then:
        - lambda: |-
            global_aquarium.trigger_alert(message, duration_seconds);
    - service: clear_alert
      then:
        - lambda: |-
            global_aquarium.clear_alert();

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Use IP address directly for cross-subnet resolution
  use_address: 192.168.1.190

# --- Web Server (for basic diagnostics) ---
web_server:
  port: 80

# --- JC3248W535C_I Hardware Interfaces ---
spi:
  - type: quad
    clk_pin: 47
    data_pins: [21, 48, 40, 39]

i2c:
  - id: i2c_bus
    sda: 4
    scl: 8

output:
  - platform: ledc
    id: gpio_backlight_pwm
    pin: 1

light:
  - platform: monochromatic
    id: backlight
    name: Backlight
    output: gpio_backlight_pwm
    restore_mode: ALWAYS_ON

display:
  - platform: qspi_dbi
    id: lcd
    dimensions:
      width: 320
      height: 480
    rotation: 90
    model: CUSTOM
    data_rate: 40MHz
    cs_pin:
      number: 45
      ignore_strapping_warning: true
    draw_from_origin: true
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: axs15231
    id: touch
    i2c_id: i2c_bus
    address: 0x3B
    transform:
      swap_xy: true
      mirror_x: true
    update_interval: 50ms
    touch_timeout: 50ms
    # Tapping screen physically triggers ripple/panic
    on_touch:
      then:
        - lambda: |-
            global_aquarium.tap(touch.x, touch.y);

# --- Fonts ---
font:
  - file: "gfonts://Roboto"
    id: f_title
    size: 28
  - file: "gfonts://Roboto Mono"
    id: f_card_title
    size: 22
  - file: "gfonts://Roboto"
    id: f_small
    size: 14
  - file: "gfonts://Roboto"
    id: f_tiny
    size: 10
# --- Home Assistant Sensors and Switches ---
sensor:
  - platform: template
    name: "Fish Fed Count"
    id: fish_fed_count
    accuracy_decimals: 0
    unit_of_measurement: "times"
    state_class: total_increasing

switch:
  - platform: template
    name: "Aquarium Bubbler"
    id: bubbler_switch
    optimistic: true
    restore_mode: ALWAYS_ON
    turn_on_action:
      - lambda: |-
          global_aquarium.set_bubbler(true);
    turn_off_action:
      - lambda: |-
          global_aquarium.set_bubbler(false);

  - platform: template
    name: "Aquarium Disco Mode"
    id: disco_switch
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      - lambda: |-
          global_aquarium.set_disco(true);
    turn_off_action:
      - lambda: |-
          global_aquarium.set_disco(false);

# --- LVGL User Interface layout ---
